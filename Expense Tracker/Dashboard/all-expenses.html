<!DOCTYPE html>
<html>
<head>
  <title>All Expenses</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <div class="container mt-4">
    <h2>Your Expenses</h2>
    <div id="expenses"></div>
    <button class="btn btn-secondary mt-3" onclick="goBack()">← Back to Dashboard</button>
  </div>

  <script>
    const user = JSON.parse(localStorage.getItem("loggedInUser"));
    const expenses = JSON.parse(localStorage.getItem("expenses")) || [];
    const userExpenses = expenses.filter(e => e.userEmail === user.email);

    const list = document.getElementById("expenses");
    list.innerHTML = "";

    userExpenses.forEach((e, i) => {
      list.innerHTML += `
        <div class="card mb-2">
          <div class="card-body">
            <strong>${e.title}</strong> - ${e.amount} ${e.currency} (${e.category})
          </div>
        </div>
      `;
    });
  </script>

  <script src="script.js"></script>
</body>
</html>
