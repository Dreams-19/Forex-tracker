<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense Tracker</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>  
  <div class="container mt-4">
    <h1 class="text-center">Expense Tracker 2.0</h1>

    <!-- Login Form (default visible) -->
    <div id="loginSection" class="mb-4">
      <h4>Login</h4>
      <input type="email" id="loginEmail" class="form-control mb-2" placeholder="Email" />
      <input type="password" id="loginPassword" class="form-control mb-2" placeholder="Password" />
      <button class="btn btn-primary w-100" onclick="loginUser()">Login</button>
      <p class="mt-2 text-center">
        Don’t have an account?
        <a href="#" onclick="showRegister()">Register</a>
      </p>
    </div>

    <!-- Register Form (hidden initially) -->
    <div id="registerSection" class="mb-4" style="display: none;">
      <h4>Register</h4>
      <input type="text" id="regName" class="form-control mb-2" placeholder="Name" />
      <input type="email" id="regEmail" class="form-control mb-2" placeholder="Email" />
      <input type="password" id="regPassword" class="form-control mb-2" placeholder="Password" />
      <button class="btn btn-success w-100" onclick="registerUser()">Register</button>
      <p class="mt-2 text-center">
        Already have an account?
        <a href="#" onclick="showLogin()">Login</a>
      </p>
    </div>   
  <script src="script.js"></script>
</body>
</html>
